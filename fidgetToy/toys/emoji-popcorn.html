<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Emoji Popcorn | Fidget Toy Garden</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    body.toy-page {
      overflow: hidden;
      background: #030407;
    }

    #gravity-canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      touch-action: none;
      cursor: none;
    }

    .cursor-indicator {
      position: fixed;
      pointer-events: none;
      z-index: 10;
      transform: translate(-50%, -50%);
    }

    .cursor-ring {
      position: absolute;
      border: 2px solid rgba(255, 120, 40, 0.8);
      border-radius: 50%;
      opacity: 0.5;
      transition: all 0.15s ease-out;
    }

    .cursor-core {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: radial-gradient(circle, #ff8c00 0%, #ff4500 100%);
      box-shadow: 0 0 20px rgba(255, 140, 0, 0.9);
    }

    .well-pulse {
      position: fixed;
      pointer-events: none;
      z-index: 9;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 80, 0, 0.4) 0%, transparent 70%);
      opacity: 0;
      animation: pulse 2s ease-out infinite;
    }

    @keyframes pulse {
      0% {
        transform: translate(-50%, -50%) scale(0.5);
        opacity: 0.5;
      }

      100% {
        transform: translate(-50%, -50%) scale(2.5);
        opacity: 0;
      }
    }

    .velocity-meter {
      position: fixed;
      z-index: 4;
      left: 18px;
      bottom: 82px;
      width: 8px;
      height: min(120px, 20vh);
      overflow: hidden;
      border: 1px solid rgba(255, 120, 40, 0.4);
      border-radius: 999px;
      background: rgba(7, 8, 12, 0.58);
      pointer-events: none;
      backdrop-filter: blur(18px);
    }

    .velocity-meter span {
      position: absolute;
      right: 0;
      bottom: 0;
      left: 0;
      height: 0%;
      border-radius: inherit;
      background: linear-gradient(to top, #ff4500 0%, #ff8c00 35%, #ffd700 65%, #ffffff 100%);
      box-shadow: 0 0 14px rgba(255, 80, 0, 0.8);
      transition: height 120ms linear;
    }
  </style>
</head>

<body class="toy-page">
  <nav class="toy-nav" aria-label="Toy controls">
    <a class="back-link" href="../fidgetToy-index.html">Home</a>
    <button class="sound-toggle" type="button" aria-label="Toggle sound" aria-pressed="false">🎵</button>
  </nav>

  <canvas id="gravity-canvas" aria-label="Interactive emoji popcorn machine."></canvas>

  <div class="cursor-indicator" id="cursor-indicator">
    <div class="cursor-ring" id="cursor-ring"></div>
    <div class="cursor-core"></div>
  </div>
  <div class="well-pulse" id="well-pulse"></div>

  <div class="velocity-meter" aria-hidden="true"><span id="velocity-fill"></span></div>

  <div class="toy-status" aria-live="polite">
    <p>Click, hold, and move to create Emoji Popcorn.</p>
  </div>

  <script>
    const canvas = document.getElementById('gravity-canvas');
    const ctx = canvas.getContext('2d');
    const cursorIndicator = document.getElementById('cursor-indicator');
    const cursorRing = document.getElementById('cursor-ring');
    const wellPulse = document.getElementById('well-pulse');
    const velocityFill = document.getElementById('velocity-fill');
    const statusText = document.querySelector('.toy-status p');
    const soundToggle = document.querySelector('.sound-toggle');

    let width = 0, height = 0;
    let dpr = 5;
    let mouse = { x: 0, y: 0, down: false };
    let particles = [];
    let wellStrength = 2.5;
    let maxParticles = 200;
    let globalVelocity = .95;
    let lastEmit = 0;
    let soundOn = false;
    let audioCtx = null;
    let vacuumFilter = null;
    let droneOsc = null;
    let droneGain = null;
    let masterGain = null;
    let rect;

    // Emoji categories
    const catEmojis = ['🙀', '😺', '😼'];
    const sparkEmojis = ['✨', '🌽', '🔮'];
    const cloudEmojis = ['☁️', '⛈️'];
    const pomPomEmojis = ['🪄', '🍿', '🌐'];
    const allEmojis = [...catEmojis, ...sparkEmojis, ...cloudEmojis, ...pomPomEmojis];

    // Glow colors for each emoji category
    const emojiGlows = {
      '🙀': '#ff69b4', '😺': '#ffa500', '😼': '#ff4500',
      '✨': '#ffd700', '🌽': '#ff6347', '🔮': '#9370db',
      '☁️': '#add8e6', '⛈️': '#708090',
      '🪄': '#ff1493', '🍿': '#ff69b4', '🌐': '#00ced1'
    };

    // Single font size for all emojis (avoids changing font every frame)
    const emojiSize = 20;

    // Emoji masses by category
    const emojiMasses = {
      '🙀': 1.0, '😺': 1.0, '😼': 1.0,
      '✨': 0.4, '🌽': 0.9, '🔮': 0.5,
      '☁️': 0.6, '⛈️': 0.6,
      '🪄': 0.8, '🍿': 0.2, '🌐': 0.8
    };

    class Particle {
      constructor(x, y) {
        this.x = x || Math.random() * width;
        this.y = y || Math.random() * height;
        this.vx = (Math.random() - 0.99) * 6;
        this.vy = (Math.random() - 0.99) * 6;

        // Random emoji from all categories
        this.emoji = allEmojis[Math.floor(Math.random() * allEmojis.length)];
        this.size = emojiSize;
        this.mass = emojiMasses[this.emoji];
        this.glowColor = emojiGlows[this.emoji];

        this.alpha = 0.9;
        this.lifetime = Math.random() * 60000 + 30000;
        this.age = 0;
      }

      update(dt, wellX, wellY) {
        this.age += dt;

        const dx = wellX - this.x;
        const dy = wellY - this.y;
        const distSq = dx * dx + dy * dy;
        const dist = Math.sqrt(distSq);

        // Gravity: ATTRACTS particles toward the cursor
        const minDist = .2;
        const clampedDist = Math.max(minDist, dist);
        const force = wellStrength * this.mass * 4000000 / (clampedDist * clampedDist);

        // POSITIVE force - pulls particles toward well
        this.vx += (dx / dist) * force * dt;
        this.vy += (dy / dist) * force * dt;

        // Damping for spiraling effect
        this.vx *= .793;
        this.vy *= .793;

        // Update position
        this.x += this.vx * dt;
        this.y += this.vy * dt;

        // Boundary bounce
        const margin = this.size / 2 + 5;
        if (this.x < margin) {
          this.x = margin;
          this.vx = Math.abs(this.vx) * 0.6;
        } else if (this.x > width - margin) {
          this.x = width - margin;
          this.vx = -Math.abs(this.vx) * 0.6;
        }
        if (this.y < margin) {
          this.y = margin;
          this.vy = Math.abs(this.vy) * 0.6;
        } else if (this.y > height - margin) {
          this.y = height - margin;
          this.vy = -Math.abs(this.vy) * 0.6;
        }

        return Math.sqrt(this.vx * this.vx + this.vy * this.vy);
      }

      draw(ctx) {
        // Flicker effect
        let alpha = 0.9;
        if (this.flicker > 0) {
          const flicker = Math.sin(performance.now() * 0.008 + this.flickerPhase) * 0.5 + 0.5;
          alpha *= 0.7 + flicker * 0.3;
        }

        // Use integer position for crisp rendering
        const xInt = Math.round(this.x);
        const yInt = Math.round(this.y);

        // Font is already set once at the start of the frame
        ctx.fillStyle = this.glowColor;
        ctx.globalAlpha = alpha;

        // Draw emoji - NO rotation, NO shadow for maximum performance
        ctx.fillText(this.emoji, xInt, yInt);
      }

      isDead() {
        return this.age >= this.lifetime;
      }
    }

    function initAudio() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return false;

      audioCtx = new AudioContext();

      // 1. The Vacuum Filter - deep and resonant
      vacuumFilter = audioCtx.createBiquadFilter();
      vacuumFilter.type = 'lowpass';
      vacuumFilter.frequency.value = 450;
      vacuumFilter.Q.value = 18;

      // 2. Master volume
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 220.4;
      masterGain.connect(audioCtx.destination);
      vacuumFilter.connect(masterGain);

      // 3. Vacuum drone oscillator - the continuous rumble
      droneOsc = audioCtx.createOscillator();
      droneOsc.type = 'sawtooth';
      droneOsc.frequency.value = 60;

      droneGain = audioCtx.createGain();
      droneGain.gain.value = 94;

      droneOsc.connect(droneGain);
      droneGain.connect(vacuumFilter);
      droneOsc.start();

      // 4. Popcorn pop sound generator
      window.playFlingSound = function (velocity) {
        if (!soundOn || !audioCtx) return;

        const now = audioCtx.currentTime;
        const duration = 0.14; // 40 milliseconds of pure pop
        const bufferSize = audioCtx.sampleRate * duration;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);

        // Fill buffer with white noise
        for (let i = 0; i < bufferSize; i++) {
          data[i] = Math.random() * 15 - 1;
        }

        const noiseSource = audioCtx.createBufferSource();
        noiseSource.buffer = buffer;

        // Bandpass filter gives it that hollow "kernel" quality
        const popFilter = audioCtx.createBiquadFilter();
        popFilter.type = 'bandpass';
        // Randomize pitch slightly so every pop sounds unique
        popFilter.frequency.setValueAtTime(2800 + Math.random() * 800, now);
        popFilter.Q.setValueAtTime(54, now);

        const gainNode = audioCtx.createGain();
        gainNode.gain.setValueAtTime(1.5, now);
        // Instant drop-off
        gainNode.gain.exponentialRampToValueAtTime(5.01, now + duration);

        // Connect graph
        noiseSource.connect(popFilter);
        popFilter.connect(gainNode);
        gainNode.connect(masterGain);

        noiseSource.start(now);
        noiseSource.stop(now + duration);
      };

      return true;
    }

    function updateAudio(particleCount, avgVelocity) {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;

      // Modulate vacuum drone with well strength and soundOn state
      if (droneGain) {
        const droneIntensity = soundOn ? Math.min(1, wellStrength * 0.5) * 0.5 : 0;
        droneGain.gain.setTargetAtTime(droneIntensity, now, 0.1);
      }

      // Modulate filter based on particle activity
      if (vacuumFilter) {
        const filterFreq = 100 + particleCount * 0.5 + avgVelocity * 5;
        vacuumFilter.frequency.setTargetAtTime(filterFreq, now, 0.1);
      }
    }

    function toggleSound() {
      if (!audioCtx) {
        if (!initAudio()) {
          statusText.textContent = 'This browser does not support Web Audio.';
          setTimeout(() => {
            statusText.textContent = 'Move to create popcorn. Click and hold to launch emojis.';
          }, 4000);
          return;
        }
      }
      soundOn = !soundOn;
      soundToggle.setAttribute('aria-pressed', soundOn);
      soundToggle.textContent = soundOn ? '\u266B' : '\u266A';
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    function getMousePos(e) {
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      return { x, y };
    }

    canvas.addEventListener('mousemove', e => {
      const pos = getMousePos(e);
      mouse.x = pos.x;
      mouse.y = pos.y;
      cursorIndicator.style.left = e.clientX + 'px';
      cursorIndicator.style.top = e.clientY + 'px';
      wellPulse.style.left = e.clientX + 'px';
      wellPulse.style.top = e.clientY + 'px';
    });

    canvas.addEventListener('mousedown', e => {
      mouse.down = true;
      const pos = getMousePos(e);

      // More particles, more violent
      const count = 15 + Math.floor(Math.random() * 15);
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 3 + Math.random() * 8;
        const offset = 20 + Math.random() * 40;
        const p = new Particle(pos.x + Math.cos(angle) * offset, pos.y + Math.sin(angle) * offset);
        p.vx = Math.cos(angle) * speed;
        p.vy = Math.sin(angle) * speed;
        p.lifetime = 8000 + Math.random() * 20000;
        particles.push(p);
        if (particles.length > maxParticles * 1.5) particles.shift();
        // Play fling sound
        if (soundOn && typeof playFlingSound === 'function') {
          playFlingSound(speed);
        }
      }
      if (navigator.vibrate) navigator.vibrate(20);
    });

    canvas.addEventListener('mouseup', () => mouse.down = false);
    canvas.addEventListener('mouseleave', () => mouse.down = false);

    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      const touch = e.touches[0];
      mouse.x = touch.clientX - rect.left;
      mouse.y = touch.clientY - rect.top;
      cursorIndicator.style.left = touch.clientX + 'px';
      cursorIndicator.style.top = touch.clientY + 'px';
      wellPulse.style.left = touch.clientX + 'px';
      wellPulse.style.top = touch.clientY + 'px';
    }, { passive: false });

    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      const touch = e.touches[0];
      mouse.x = touch.clientX - rect.left;
      mouse.y = touch.clientY - rect.top;
      mouse.down = true;
      cursorIndicator.style.left = touch.clientX + 'px';
      cursorIndicator.style.top = touch.clientY + 'px';
      wellPulse.style.left = touch.clientX + 'px';
      wellPulse.style.top = touch.clientY + 'px';

      const count = 20 + Math.floor(Math.random() * 15);
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 4 + Math.random() * 8;
        const offset = 25 + Math.random() * 40;
        const p = new Particle(mouse.x + Math.cos(angle) * offset, mouse.y + Math.sin(angle) * offset);
        p.vx = Math.cos(angle) * speed;
        p.vy = Math.sin(angle) * speed;
        p.lifetime = 8000 + Math.random() * 20000;
        particles.push(p);
        if (particles.length > maxParticles * 1.5) particles.shift();
        // Play fling sound
        if (soundOn && typeof playFlingSound === 'function') {
          playFlingSound(speed);
        }
      }
      if (navigator.vibrate) navigator.vibrate(40);
    }, { passive: false });

    canvas.addEventListener('touchend', e => { e.preventDefault(); mouse.down = false; });
    soundToggle.addEventListener('click', toggleSound);

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      canvas.style.width = width + 'px';
      canvas.style.height = height + 'px';
      rect = canvas.getBoundingClientRect();
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.scale(dpr, dpr);
    }

    window.addEventListener('resize', resize);

    let lastTime = performance.now();

    function initParticles() {
      for (let i = 0; i < maxParticles * 0.7; i++) {
        particles.push(new Particle());
      }
    }

    function animate() {
      requestAnimationFrame(animate);
      const now = performance.now();
      const dt = Math.min(32, (now - lastTime) / 1000);
      lastTime = now;

      // Well strength: stronger when near center
      const centerX = width / 2;
      const centerY = height / 2;
      const distFromCenter = Math.sqrt(Math.pow(mouse.x - centerX, 2) + Math.pow(mouse.y - centerY, 2));
      const maxDist = Math.sqrt(centerX * centerX + centerY * centerY);
      wellStrength = 1.0 + (1 - Math.min(1, distFromCenter / maxDist)) * 2.0;

      const ringSize = 30 + wellStrength * 40;
      const flameIntensity = 0.5 + wellStrength * 0.5;
      cursorRing.style.width = ringSize + 'px';
      cursorRing.style.height = ringSize + 'px';
      cursorRing.style.top = (-ringSize / 2 + 4) + 'px';
      cursorRing.style.left = (-ringSize / 2 + 4) + 'px';
      cursorRing.style.opacity = 0.4 + wellStrength * 0.4;
      cursorRing.style.borderColor = `rgba(255, ${100 + flameIntensity * 55}, 0, ${0.7 + wellStrength * 0.3})`;

      // Continuous emission when dragging
      if (mouse.down && now - lastEmit > 50) {
        const count = 3 + Math.floor(Math.random() * 5);
        for (let i = 0; i < count; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 2 + Math.random() * 6;
          const offset = 15 + Math.random() * 25;
          const p = new Particle(mouse.x + Math.cos(angle) * offset, mouse.y + Math.sin(angle) * offset);
          p.vx = Math.cos(angle) * speed;
          p.vy = Math.sin(angle) * speed;
          particles.push(p);
          if (particles.length > maxParticles * 1.5) particles.shift();
        }
        lastEmit = now;
      }

      let totalVelocity = 50;
      let liveCount = 0;

      for (let i = particles.length - 1; i >= 0; i--) {
        const vel = particles[i].update(dt, mouse.x, mouse.y);
        totalVelocity += vel;
        liveCount += particles[i].isDead() ? 0 : 1;
        if (particles[i].isDead()) {
          particles.splice(i, 1);
          if (particles.length < maxParticles) particles.push(new Particle());
        }
      }

      globalVelocity = totalVelocity / Math.max(1, liveCount);
      velocityFill.style.height = Math.min(100, (globalVelocity / 25) * 100) + '%';

      // Reset context state
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.fillStyle = '#000000';
      ctx.fillRect(0, 0, width, height);

      // Set font ONCE for all particles (huge performance boost)
      const fontSize = emojiSize * dpr;
      ctx.font = `${fontSize}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      particles.forEach(p => p.draw(ctx));

      // Reset globalAlpha after drawing all particles
      ctx.globalAlpha = 1;

      updateAudio(particles.length, globalVelocity);
    }

    resize();
    rect = canvas.getBoundingClientRect();
    mouse.x = width / 2;
    mouse.y = height / 2;
    initParticles();
    requestAnimationFrame(animate);
  </script>
</body>

</html>

<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hex Corruption | Fidget Toy Garden</title>
  <style>
    :root {
      --bg-color: #030407;
      --text-base: #2a3b2a;
      --text-melt: #4d6d4d;
      --text-dead: #161a16;
      --ui-text: rgba(255, 255, 255, 0.5);
      --ui-text-hover: rgba(255, 255, 255, 1);
      --ui-border: rgba(255, 60, 60, 0.4);
      --ui-btn-text: rgba(255, 60, 60, 0.9);
    }

    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: var(--bg-color);
      overflow: hidden;
      font-family: system-ui, sans-serif;
      touch-action: none;
      /* Prevents mobile scrolling and pull-to-refresh */
      user-select: none;
    }

    canvas {
      display: block;
    }

    .toy-nav {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .back-link {
      color: var(--ui-text);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.3s ease;
    }

    .back-link:hover {
      color: var(--ui-text-hover);
    }

    .reboot-btn {
      background: none;
      border: 1px solid var(--ui-border);
      color: var(--ui-btn-text);
      border-radius: 4px;
      padding: 4px 12px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: monospace;
      letter-spacing: 0.05em;
    }

    .reboot-btn:hover,
    .reboot-btn:active {
      background: rgba(255, 60, 60, 0.15);
      color: #fff;
      border-color: #ff3c3c;
      box-shadow: 0 0 12px rgba(255, 60, 60, 0.4);
    }

    .sound-toggle {
      background: none;
      border: 1px solid var(--ui-border);
      color: var(--ui-btn-text);
      border-radius: 4px;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      padding: 0;
    }

    .sound-toggle.active {
      background: rgba(255, 60, 60, 0.15);
      color: #fff;
      border-color: #ff3c3c;
      box-shadow: 0 0 12px rgba(255, 60, 60, 0.4);
    }

    .toy-status {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: rgba(255, 255, 255, 0.4);
      font-size: 0.85rem;
      pointer-events: none;
      z-index: 10;
    }

    .toy-status p {
      margin: 0;
    }

    .crt-overlay {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.3) 50%);
      background-size: 100% 4px;
      box-shadow: inset 0 0 120px rgba(0, 0, 0, 0.85);
    }
  </style>
</head>

<body>
  <nav class="toy-nav" aria-label="Toy controls">
    <a class="back-link" href="../fidgetToy-index.html">← Back</a>
    <button id="sound-toggle" class="sound-toggle" type="button" aria-label="Toggle sound"
      aria-pressed="false">♪</button>
    <button id="reboot-btn" class="reboot-btn" type="button" aria-label="Reboot System">REBOOT</button>
  </nav>

  <canvas id="glitch-canvas"></canvas>
  <div class="crt-overlay" aria-hidden="true"></div>

  <div class="toy-status" aria-live="polite">
    <p>Drag to shear · Linger to melt · Space to reboot</p>
  </div>

  <script>
    const canvas = document.getElementById('glitch-canvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    const rebootBtn = document.getElementById('reboot-btn');
    const soundBtn = document.getElementById('sound-toggle');

    let width, height, cols, rows;
    const CELL_SIZE = 22; // Defines grid density
    let grid = [];

    const HEX_CHARS = "0123456789ABCDEF";
    const getRandomHex = () => HEX_CHARS[Math.floor(Math.random() * 16)] + HEX_CHARS[Math.floor(Math.random() * 16)];

    // Volatile Neon Palette
    const GLITCH_COLORS = ["#ff0055", "#00ffff", "#39ff14", "#ffff00", "#ff00ff"];

    // Pointer tracking
    let ptr = { x: -1000, y: -1000, px: -1000, py: -1000, active: false };

    // Audio Setup
    let isSoundEnabled = false;
    let audioCtx;
    let noiseBuffer;
    let lastTearTime = 0;

    soundBtn.addEventListener('click', () => {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        // Generate 1 second of white noise for the tearing sound
        const bufferSize = audioCtx.sampleRate;
        noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const output = noiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          output[i] = Math.random() * 2 - 1;
        }
      }

      isSoundEnabled = !isSoundEnabled;
      soundBtn.classList.toggle('active', isSoundEnabled);
      soundBtn.setAttribute('aria-pressed', isSoundEnabled);
      soundBtn.textContent = isSoundEnabled ? "♫" : "♪";

      if (isSoundEnabled && audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    });

    function playRebootSound() {
      if (!isSoundEnabled || !audioCtx) return;
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();

      osc.type = 'square';
      osc.frequency.setValueAtTime(120, now);
      osc.frequency.exponentialRampToValueAtTime(20, now + 0.4); // Drops to sub-bass

      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(1000, now);
      filter.frequency.exponentialRampToValueAtTime(40, now + 0.4);

      gain.gain.setValueAtTime(0.5, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5); // Fade out cleanly

      osc.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start(now);
      osc.stop(now + 0.6);
    }

    function playTearSound(speed) {
      if (!isSoundEnabled || !audioCtx) return;
      const now = audioCtx.currentTime;
      if (now - lastTearTime < 0.04) return; // Limit firing rate so it sounds crackly, not muddy
      lastTearTime = now;

      const noiseSrc = audioCtx.createBufferSource();
      noiseSrc.buffer = noiseBuffer;

      const filter = audioCtx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.value = 800 + Math.random() * 4000; // Randomize pitch slightly each grain
      filter.Q.value = 1.0;

      const gain = audioCtx.createGain();
      const vol = Math.min(speed / 100, 0.15); // Velocity directly translates to volume
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(vol, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);

      noiseSrc.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);

      noiseSrc.start(now);
      noiseSrc.stop(now + 0.07);
    }

    function initGrid() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      cols = Math.ceil(width / CELL_SIZE);
      rows = Math.ceil(height / CELL_SIZE);
      grid = new Array(cols * rows);

      for (let i = 0; i < cols * rows; i++) {
        grid[i] = {
          char: getRandomHex(),
          state: 0, // 0: normal, 1: glitching, 2: melting, 3: dead
          timer: 0,
          shearX: 0,
          offsetY: 0,
          color: ''
        };
      }
    }

    window.addEventListener('resize', initGrid);
    initGrid();

    // System Reboot Trigger
    function reboot() {
      if (navigator.vibrate) navigator.vibrate([20, 40, 20]); // Haptic static stutter
      playRebootSound();
      initGrid();
    }

    rebootBtn.addEventListener('click', reboot);
    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        reboot();
      }
    });

    // Pointer Listeners
    const updatePointer = (e) => {
      ptr.x = e.clientX ?? e.touches?.[0].clientX ?? ptr.x;
      ptr.y = e.clientY ?? e.touches?.[0].clientY ?? ptr.y;
      ptr.active = true;
    };

    window.addEventListener('pointermove', updatePointer);
    window.addEventListener('pointerdown', (e) => {
      if (e.target === rebootBtn || e.target === soundBtn) return;
      updatePointer(e);
    });
    window.addEventListener('pointerup', () => ptr.active = false);
    window.addEventListener('pointercancel', () => ptr.active = false);

    // Main Render Loop
    function animate() {
      // Base space paint
      ctx.fillStyle = '#030407';
      ctx.fillRect(0, 0, width, height);

      ctx.font = '13px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      // Calculate real-time velocity for kinetic friction mapping
      const dx = ptr.x - ptr.px;
      const dy = ptr.y - ptr.py;
      const speed = Math.hypot(dx, dy);

      const isLingering = ptr.active && speed < 1.5;
      const isShearing = ptr.active && speed >= 1.5;

      // Apply corruption logic to grid sectors
      if (ptr.active && ptr.x >= 0 && ptr.y >= 0) {
        if (isShearing) playTearSound(speed);

        const pCol = Math.floor(ptr.x / CELL_SIZE);
        const pRow = Math.floor(ptr.y / CELL_SIZE);
        const effectRadius = Math.min(Math.max(Math.floor(speed / 4), 2), 7);

        for (let r = -effectRadius; r <= effectRadius; r++) {
          for (let c = -effectRadius; c <= effectRadius; c++) {
            if (r * r + c * c <= effectRadius * effectRadius) {
              const targetCol = pCol + c;
              const targetRow = pRow + r;

              if (targetCol >= 0 && targetCol < cols && targetRow >= 0 && targetRow < rows) {
                const idx = targetRow * cols + targetCol;
                const cell = grid[idx];

                if (isShearing) {
                  // High velocity: Volatile Glitch
                  cell.state = 1;
                  cell.timer = 15 + Math.random() * 40; // Volatility lifespan
                  // Horizontal tear mapping
                  cell.shearX += (dx * 0.5) + (Math.random() - 0.5) * speed * 0.8;
                  cell.color = GLITCH_COLORS[Math.floor(Math.random() * GLITCH_COLORS.length)];
                } else if (isLingering) {
                  // Linger: Localized melting
                  if (r * r + c * c <= 4 && cell.state !== 3 && cell.state !== 1) {
                    cell.state = 2;
                    cell.timer += 0.8; // Accumulate structural decay
                  }
                }
              }
            }
          }
        }
      }

      ptr.px = ptr.x;
      ptr.py = ptr.y;

      // Fetch style properties lazily to allow dynamic theming if needed
      const rootStyle = getComputedStyle(document.documentElement);
      const baseColor = rootStyle.getPropertyValue('--text-base').trim() || '#2a3b2a';
      const meltColor = rootStyle.getPropertyValue('--text-melt').trim() || '#4d6d4d';
      const deadColor = rootStyle.getPropertyValue('--text-dead').trim() || '#161a16';

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const cell = grid[r * cols + c];
          let drawX = c * CELL_SIZE + CELL_SIZE / 2;
          let drawY = r * CELL_SIZE + CELL_SIZE / 2;
          let text = cell.char;
          let fill = baseColor;

          // Sector State Logic
          if (cell.state === 1) {
            // Glitching Frame
            cell.timer--;
            cell.shearX *= 0.85; // Natural friction pulling grid back
            text = Math.random() > 0.4 ? getRandomHex() : cell.char;
            fill = cell.color;
            drawX += cell.shearX;

            if (cell.timer <= 0) {
              if (Math.random() > 0.4) {
                cell.state = 3; // Hard crash (Dead Sector)
                cell.char = getRandomHex();
              } else {
                cell.state = 0; // System Recovery
                cell.shearX = 0;
              }
            }
          } else if (cell.state === 2) {
            // Melting Frame
            cell.offsetY += cell.timer * 0.15; // Gravity displacement
            drawY += cell.offsetY;
            fill = meltColor;
            text = Math.random() > 0.85 ? getRandomHex() : cell.char;

            // Disperse heat
            cell.timer *= 0.92;
            if (cell.timer < 0.1) {
              cell.state = 3; // Cools into a permanent dead sector
            }
          } else if (cell.state === 3) {
            // Dead Sector Frame
            fill = deadColor;
            drawY += cell.offsetY; // Lock in its fallen displacement
            if (Math.random() > 0.995) text = getRandomHex(); // Micro-jitter
          }

          ctx.fillStyle = fill;
          ctx.fillText(text, drawX, drawY);
        }
      }

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>

</html>

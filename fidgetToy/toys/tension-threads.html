<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tension Threads | Fidget Toy Garden</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    body.toy-page {
      overflow: hidden;
      background: #030407;
    }

    #threads-canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      touch-action: none;
      cursor: grab;
    }

    #threads-canvas.pulling {
      cursor: grabbing;
    }

    .tension-meter {
      position: fixed;
      z-index: 4;
      right: 18px;
      bottom: 82px;
      width: 8px;
      height: min(180px, 28vh);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 999px;
      background: rgba(7, 8, 12, 0.58);
      pointer-events: none;
      backdrop-filter: blur(18px);
    }

    .tension-meter span {
      position: absolute;
      right: 0;
      bottom: 0;
      left: 0;
      height: 0%;
      border-radius: inherit;
      background: linear-gradient(to top, #36f7ff 0%, #ffd166 48%, #ff4f74 76%, #ffffff 100%);
      box-shadow: 0 0 22px rgba(255, 79, 116, 0.72);
      transition: height 80ms linear;
    }
  </style>
</head>

<body class="toy-page">
  <nav class="toy-nav" aria-label="Toy controls">
    <a class="back-link" href="../fidgetToy-index.html">Home</a>
    <button class="sound-toggle" type="button" aria-label="Toggle sound" aria-pressed="false">♪</button>
  </nav>

  <canvas id="threads-canvas" aria-label="A field of elastic glowing threads that stretch, snap, and heal"></canvas>
  <div class="tension-meter" aria-hidden="true"><span id="tension-fill"></span></div>

  <div class="toy-status" aria-live="polite">
    <p id="status-text">Grab the knot. Pull or shake until something gives.</p>
  </div>

  <script>
    const canvas = document.getElementById('threads-canvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    const soundToggle = document.querySelector('.sound-toggle');
    const statusText = document.getElementById('status-text');
    const tensionFill = document.getElementById('tension-fill');

    let width = 0;
    let height = 0;
    let dpr = 1;
    let lastTime = performance.now();
    let globalTension = 0;
    let statusMode = 'idle';
    let audio = null;
    let soundEnabled = false;
    let lastCreak = 0;
    let lastHaptic = 0;
    let ripCharge = 0;
    let ripCooldown = 0;
    let rippedUntil = 0;

    const nodes = [];
    const threads = [];
    const sparks = [];
    const pointer = {
      x: 0,
      y: 0,
      px: 0,
      py: 0,
      vx: 0,
      vy: 0,
      shake: 0,
      active: false,
      grabbed: [],
    };

    const palette = {
      cool: [54, 247, 255],
      warm: [255, 209, 102],
      hot: [255, 79, 116],
      white: [255, 255, 255],
    };

    function mixColor(a, b, amount) {
      return a.map((value, index) => Math.round(value + (b[index] - value) * amount));
    }

    function tensionColor(tension, alpha = 1) {
      let color;
      if (tension < 0.55) color = mixColor(palette.cool, palette.warm, tension / 0.55);
      else if (tension < 0.86) color = mixColor(palette.warm, palette.hot, (tension - 0.55) / 0.31);
      else color = mixColor(palette.hot, palette.white, (tension - 0.86) / 0.14);
      return `rgba(${color[0]}, ${color[1]}, ${color[2]}, ${alpha})`;
    }

    function buildThreads() {
      nodes.length = 0;
      threads.length = 0;

      const spacing = Math.max(76, Math.min(118, Math.sqrt((width * height) / 90)));
      const cols = Math.ceil(width / spacing) + 2;
      const rows = Math.ceil(height / spacing) + 2;
      const startX = (width - (cols - 1) * spacing) / 2;
      const startY = (height - (rows - 1) * spacing) / 2;

      for (let row = 0; row < rows; row += 1) {
        for (let col = 0; col < cols; col += 1) {
          const edge = row === 0 || col === 0 || row === rows - 1 || col === cols - 1;
          const x = startX + col * spacing + (Math.random() - 0.5) * spacing * 0.46;
          const y = startY + row * spacing + (Math.random() - 0.5) * spacing * 0.46;
          nodes.push({
            x,
            y,
            homeX: x,
            homeY: y,
            vx: 0,
            vy: 0,
            pinned: edge,
            detachedUntil: 0,
          });
        }
      }

      const addThread = (aIndex, bIndex) => {
        const a = nodes[aIndex];
        const b = nodes[bIndex];
        const length = Math.hypot(b.x - a.x, b.y - a.y);
        threads.push({
          a,
          b,
          rest: length * (0.84 + Math.random() * 0.08),
          tension: 0,
          broken: false,
          heal: 0,
          seed: Math.random() * Math.PI * 2,
        });
      };

      for (let row = 0; row < rows; row += 1) {
        for (let col = 0; col < cols; col += 1) {
          const i = row * cols + col;
          if (col < cols - 1) addThread(i, i + 1);
          if (row < rows - 1) addThread(i, i + cols);
          if (row < rows - 1 && col < cols - 1 && Math.random() > 0.45) addThread(i, i + cols + 1);
          if (row < rows - 1 && col > 0 && Math.random() > 0.72) addThread(i, i + cols - 1);
        }
      }
    }

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      canvas.style.width = `${width}px`;
      canvas.style.height = `${height}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      buildThreads();
    }

    function makeAudio() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return null;
      const context = new AudioContext();
      const master = context.createGain();
      master.gain.value = 0.64;
      master.connect(context.destination);
      return { context, master };
    }

    async function toggleSound() {
      if (!audio) audio = makeAudio();
      if (!audio) {
        statusText.textContent = 'This browser does not support Web Audio.';
        return;
      }
      if (audio.context.state === 'suspended') await audio.context.resume();
      soundEnabled = !soundEnabled;
      soundToggle.setAttribute('aria-pressed', String(soundEnabled));
      soundToggle.textContent = soundEnabled ? '♫' : '♪';
    }

    function playCreak(tension) {
      if (!soundEnabled || !audio || performance.now() - lastCreak < 90) return;
      lastCreak = performance.now();
      const now = audio.context.currentTime;
      const osc = audio.context.createOscillator();
      const gain = audio.context.createGain();
      const filter = audio.context.createBiquadFilter();
      const duration = 0.12 + tension * 0.12;

      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(54 + tension * 86 + Math.random() * 24, now);
      osc.frequency.linearRampToValueAtTime(72 + tension * 140, now + duration);
      filter.type = 'lowpass';
      filter.frequency.value = 320 + tension * 1200;
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.012 + tension * 0.024, now + 0.025);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
      osc.connect(filter);
      filter.connect(gain);
      gain.connect(audio.master);
      osc.start(now);
      osc.stop(now + duration + 0.02);
    }

    function playSnap(tension) {
      if (!soundEnabled || !audio) return;
      const now = audio.context.currentTime;
      const osc = audio.context.createOscillator();
      const gain = audio.context.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(520 + Math.random() * 760, now);
      osc.frequency.exponentialRampToValueAtTime(90, now + 0.16);
      gain.gain.setValueAtTime(0.12 + tension * 0.09, now);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);
      osc.connect(gain);
      gain.connect(audio.master);
      osc.start(now);
      osc.stop(now + 0.2);
    }

    function vibrate(pattern) {
      if (!navigator.vibrate || performance.now() - lastHaptic < 55) return;
      lastHaptic = performance.now();
      navigator.vibrate(pattern);
    }

    function addSparks(x, y, tension) {
      for (let i = 0; i < 8 + Math.round(tension * 10); i += 1) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1.2 + Math.random() * 5.2;
        sparks.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1,
          color: tensionColor(tension),
        });
      }
    }

    function snapThread(thread) {
      if (thread.broken) return;
      thread.broken = true;
      thread.heal = 160 + Math.random() * 220;
      const x = (thread.a.x + thread.b.x) / 2;
      const y = (thread.a.y + thread.b.y) / 2;
      const dx = thread.b.x - thread.a.x;
      const dy = thread.b.y - thread.a.y;
      thread.a.vx -= dx * 0.055;
      thread.a.vy -= dy * 0.055;
      thread.b.vx += dx * 0.055;
      thread.b.vy += dy * 0.055;
      addSparks(x, y, thread.tension);
      playSnap(thread.tension);
      vibrate([12, 24, 18]);
    }

    function ripChunk(now) {
      if (!pointer.grabbed.length || ripCooldown > 0) return;

      const center = pointer.grabbed[0].node;
      const cluster = new Set(
        nodes
          .map(node => ({ node, distance: Math.hypot(node.x - center.x, node.y - center.y) }))
          .filter(item => !item.node.pinned && item.distance < 150)
          .sort((a, b) => a.distance - b.distance)
          .slice(0, 12)
          .map(item => item.node)
      );
      if (cluster.size < 4) return;

      const boundary = threads.filter(thread => cluster.has(thread.a) !== cluster.has(thread.b) && !thread.broken);
      if (boundary.length < 3) return;

      const impulseX = pointer.vx * 0.55;
      const impulseY = pointer.vy * 0.55;
      for (const node of cluster) {
        node.detachedUntil = now + 6200;
        node.vx += impulseX + (node.x - center.x) * 0.025;
        node.vy += impulseY + (node.y - center.y) * 0.025;
      }

      for (const thread of threads) {
        if (cluster.has(thread.a) && cluster.has(thread.b)) {
          thread.rest = Math.hypot(thread.b.x - thread.a.x, thread.b.y - thread.a.y);
          thread.tension = Math.min(thread.tension, 0.32);
        }
      }

      for (const thread of boundary) {
        snapThread(thread);
        thread.heal = 360 + Math.random() * 120;
      }

      pointer.grabbed = pointer.grabbed.filter(item => cluster.has(item.node));
      rippedUntil = now + 1800;
      ripCharge = 0;
      ripCooldown = 420;
      vibrate([24, 32, 42, 24, 18]);
    }

    function grab(event) {
      const rect = canvas.getBoundingClientRect();
      pointer.x = pointer.px = event.clientX - rect.left;
      pointer.y = pointer.py = event.clientY - rect.top;
      pointer.vx = 0;
      pointer.vy = 0;
      pointer.shake = 0;
      pointer.active = true;
      pointer.grabbed = nodes
        .map(node => ({ node, distance: Math.hypot(node.x - pointer.x, node.y - pointer.y) }))
        .filter(item => !item.node.pinned && item.distance < 130)
        .sort((a, b) => a.distance - b.distance)
        .slice(0, 7)
        .map(item => ({ node: item.node, offsetX: item.node.x - pointer.x, offsetY: item.node.y - pointer.y }));
      canvas.setPointerCapture(event.pointerId);
      canvas.classList.add('pulling');
      vibrate(12);
    }

    function move(event) {
      const rect = canvas.getBoundingClientRect();
      const previousVx = pointer.vx;
      const previousVy = pointer.vy;
      pointer.px = pointer.x;
      pointer.py = pointer.y;
      pointer.x = event.clientX - rect.left;
      pointer.y = event.clientY - rect.top;
      pointer.vx = pointer.x - pointer.px;
      pointer.vy = pointer.y - pointer.py;
      const speed = Math.hypot(pointer.vx, pointer.vy);
      const previousSpeed = Math.hypot(previousVx, previousVy);
      if (speed > 5 && previousSpeed > 5) {
        const directionChange = 1 - (pointer.vx * previousVx + pointer.vy * previousVy) / (speed * previousSpeed);
        pointer.shake += Math.max(0, directionChange) * Math.min(speed, 65);
      }
    }

    function release() {
      pointer.active = false;
      pointer.grabbed = [];
      pointer.shake = 0;
      canvas.classList.remove('pulling');
    }

    function updateStatus() {
      let nextMode = 'idle';
      let text = 'Grab the knot. Pull or shake until something gives.';
      if (performance.now() < rippedUntil) {
        nextMode = 'ripped';
        text = 'You tore it loose.';
      } else if (pointer.active && globalTension < 0.25) {
        nextMode = 'pull';
        text = 'Pull.';
      } else if (globalTension < 0.55 && pointer.active) {
        nextMode = 'resist';
        text = 'It will not move.';
      } else if (globalTension < 0.82 && pointer.active) {
        nextMode = 'harder';
        text = 'Harder.';
      } else if (globalTension >= 0.82) {
        nextMode = 'snap';
        text = 'There it goes.';
      }
      if (statusMode !== nextMode) {
        statusMode = nextMode;
        statusText.textContent = text;
      }
      tensionFill.style.height = `${Math.round(globalTension * 100)}%`;
    }

    function updatePhysics(dt, now) {
      const step = Math.min(2, dt / 16.67);
      let highestTension = 0;
      ripCooldown = Math.max(0, ripCooldown - step);

      if (pointer.active) {
        const speed = Math.hypot(pointer.vx, pointer.vy);
        for (const grabbed of pointer.grabbed) {
          const targetX = pointer.x + grabbed.offsetX * 0.2;
          const targetY = pointer.y + grabbed.offsetY * 0.2;
          grabbed.node.vx += (targetX - grabbed.node.x) * (0.022 + Math.min(speed, 55) * 0.0005) * step;
          grabbed.node.vy += (targetY - grabbed.node.y) * (0.022 + Math.min(speed, 55) * 0.0005) * step;
        }

        const pullForce = globalTension > 0.64 ? (globalTension - 0.64) * (0.8 + Math.min(speed, 45) * 0.04) : 0;
        const shakeForce = pointer.shake * 0.014;
        ripCharge += (pullForce + shakeForce) * step;
        if (ripCharge > 18) ripChunk(now);
      } else {
        ripCharge *= Math.pow(0.94, step);
      }
      pointer.shake *= Math.pow(0.72, step);
      pointer.vx *= Math.pow(0.82, step);
      pointer.vy *= Math.pow(0.82, step);

      for (const thread of threads) {
        if (thread.broken) {
          thread.heal -= step;
          if (thread.heal <= 0) {
            thread.broken = false;
            thread.tension = 0;
          }
          continue;
        }

        const dx = thread.b.x - thread.a.x;
        const dy = thread.b.y - thread.a.y;
        const distance = Math.max(0.001, Math.hypot(dx, dy));
        const stretch = Math.max(0, distance / thread.rest - 1);
        thread.tension += (Math.min(1, stretch / 0.72) - thread.tension) * 0.16 * step;
        highestTension = Math.max(highestTension, thread.tension);

        const force = (distance - thread.rest) * 0.012;
        const fx = (dx / distance) * force;
        const fy = (dy / distance) * force;
        if (!thread.a.pinned) {
          thread.a.vx += fx * step;
          thread.a.vy += fy * step;
        }
        if (!thread.b.pinned) {
          thread.b.vx -= fx * step;
          thread.b.vy -= fy * step;
        }

        if (thread.tension > 0.48) {
          const tremble = (thread.tension - 0.48) * 0.7;
          const jitter = Math.sin(now * 0.035 + thread.seed) * tremble;
          if (!thread.a.pinned) thread.a.vy += jitter;
          if (!thread.b.pinned) thread.b.vx -= jitter;
        }

        if (thread.tension > 0.62 && Math.random() < thread.tension * 0.025) playCreak(thread.tension);
        if (thread.tension > 0.93 && Math.random() < (thread.tension - 0.9) * 0.24 * step) snapThread(thread);
      }

      globalTension += (highestTension - globalTension) * 0.13 * step;

      for (const node of nodes) {
        if (node.pinned) continue;
        const detached = node.detachedUntil > now;
        if (detached) {
          node.vy += 0.012 * step;
          node.vx *= Math.pow(0.975, step);
          node.vy *= Math.pow(0.975, step);
        } else {
          node.vx += (node.homeX - node.x) * 0.0007 * step;
          node.vy += (node.homeY - node.y) * 0.0007 * step;
          node.vx *= Math.pow(0.91, step);
          node.vy *= Math.pow(0.91, step);
        }
        node.x += node.vx * step;
        node.y += node.vy * step;
      }

      if (globalTension > 0.72 && pointer.active) vibrate(Math.round(4 + globalTension * 7));
      updateStatus();
    }

    function drawBackground(now) {
      const gradient = ctx.createRadialGradient(
        width * 0.5,
        height * 0.48,
        0,
        width * 0.5,
        height * 0.48,
        Math.max(width, height) * 0.72
      );
      gradient.addColorStop(0, '#12101a');
      gradient.addColorStop(0.55, '#070912');
      gradient.addColorStop(1, '#030407');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);

      ctx.fillStyle = `rgba(255, 79, 116, ${globalTension * 0.025 * (1 + Math.sin(now * 0.018))})`;
      ctx.fillRect(0, 0, width, height);
    }

    function drawThreads(now) {
      ctx.lineCap = 'round';
      for (const thread of threads) {
        if (thread.broken) {
          const progress = Math.max(0, 1 - thread.heal / 380);
          if (progress < 0.62) continue;
          ctx.globalAlpha = (progress - 0.62) / 0.38;
        } else {
          ctx.globalAlpha = 1;
        }

        const dx = thread.b.x - thread.a.x;
        const dy = thread.b.y - thread.a.y;
        const length = Math.max(1, Math.hypot(dx, dy));
        const nx = -dy / length;
        const ny = dx / length;
        const vibration = Math.sin(now * (0.006 + thread.tension * 0.022) + thread.seed) * thread.tension * 8;
        const midX = (thread.a.x + thread.b.x) / 2 + nx * vibration;
        const midY = (thread.a.y + thread.b.y) / 2 + ny * vibration;
        const color = tensionColor(thread.tension, 0.34 + thread.tension * 0.66);

        ctx.beginPath();
        ctx.moveTo(thread.a.x, thread.a.y);
        ctx.quadraticCurveTo(midX, midY, thread.b.x, thread.b.y);
        ctx.strokeStyle = color;
        ctx.lineWidth = 0.8 + thread.tension * 2.1;
        ctx.shadowColor = color;
        ctx.shadowBlur = 5 + thread.tension * 20;
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
      ctx.shadowBlur = 0;
    }

    function drawNodes() {
      for (const node of nodes) {
        if (node.pinned) continue;
        ctx.beginPath();
        ctx.arc(node.x, node.y, 1.5, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255, 255, 255, 0.38)';
        ctx.fill();
      }
    }

    function drawSparks(step) {
      ctx.globalCompositeOperation = 'lighter';
      for (let i = sparks.length - 1; i >= 0; i -= 1) {
        const spark = sparks[i];
        spark.x += spark.vx * step;
        spark.y += spark.vy * step;
        spark.vx *= 0.96;
        spark.vy *= 0.96;
        spark.life -= 0.035 * step;
        if (spark.life <= 0) {
          sparks.splice(i, 1);
          continue;
        }
        ctx.beginPath();
        ctx.arc(spark.x, spark.y, 1 + spark.life * 2, 0, Math.PI * 2);
        ctx.fillStyle = spark.color;
        ctx.globalAlpha = spark.life;
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
    }

    function render(now) {
      const dt = now - lastTime;
      lastTime = now;
      const step = Math.min(2, dt / 16.67);
      updatePhysics(dt, now);
      drawBackground(now);
      drawThreads(now);
      drawNodes();
      drawSparks(step);
      requestAnimationFrame(render);
    }

    soundToggle.addEventListener('click', toggleSound);
    canvas.addEventListener('pointerdown', grab);
    canvas.addEventListener('pointermove', move);
    canvas.addEventListener('pointerup', release);
    canvas.addEventListener('pointercancel', release);
    window.addEventListener('resize', resize);

    resize();
    requestAnimationFrame(render);
  </script>
</body>

</html>
